stages:
  - lint
  - build

variables:
  SCALENODE_CPU: 2
  SCALENODE_RAM: 4096
  SCALENODE_DISK: 10
  DEBIAN_FRONTEND: noninteractive
  ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains

Clang Format:
  stage: lint
  image: debian:trixie
  before_get_sources:
    - apt install -qqy --update --no-install-recommends git clang-format &>/dev/null
  script:
    - git ls-files '*.c' '*.h' | xargs -r clang-format --dry-run --Werror
    - echo "OK"
  allow_failure: true

Yaml Lint:
  stage: lint
  image: debian:trixie
  before_get_sources:
    - apt install -qqy --update --no-install-recommends git yamllint &>/dev/null
  script:
    - git ls-files '*.yml' '*.yaml' | xargs -r yamllint
    - echo "OK"
  allow_failure: true

Build Demo:
  stage: build
  image: ghcr.io/zephyrproject-rtos/ci:v0.29.2
  dependencies: []
  before_script:
    - west init -l .
    - west update
  script:
    - west build -b stm32h7_renode_reference_board demo
  artifacts:
    paths:
      - build/zephyr/zephyr*
