identifier: stm32h7_renode_reference_board
name: Antmicro STM32H7 Renode Reference Board
type: mcu
arch: arm
toolchain:
  - zephyr
  - gnuarmemb
ram: 512
flash: 2048
supported:
  - adc
  - can
  - crc
  - crypto
  - dma
  - entropy
  - flash
  - gpio
  - hwinfo
  - i2c
  - input
  - led
  - netif:eth
  - nvs
  - pwm
  - rtc
  - uart
  - usb_device
  - usbd
  - uart
  - watchdog
simulation:
  - name: renode
    exec: renode
testing:
  timeout_multiplier: 2
  renode:
    uart: sysbus.usart2
    resc: boards/antmicro/stm32h7_renode_reference_board/support/stm32h7_renode_reference_board.resc
vendor: antmicro
