CONFIG_STD_C23=y
CONFIG_BOOT_BANNER_STRING="Booting STM32H7 Renode Platform Demo"

CONFIG_LOG=y
CONFIG_LOG_PROCESS_THREAD_SLEEP_MS=400
CONFIG_LOG_INFO_COLOR_GREEN=y
CONFIG_LOG_DBG_COLOR_BLUE=y

CONFIG_SHELL=y
CONFIG_SHELL_PROMPT_UART="demo:~$ "

CONFIG_STATS=y

CONFIG_ADC=y

CONFIG_CAN=y
CONFIG_CAN_SHELL=y
CONFIG_CAN_STATS=y

CONFIG_FLASH=y
CONFIG_FLASH_LOG_LEVEL_WRN=y
CONFIG_NVS=y
CONFIG_NVS_LOG_LEVEL_WRN=y
CONFIG_REBOOT=y

CONFIG_NETWORKING=y
CONFIG_NET_SHELL=y
CONFIG_NET_HOSTNAME_ENABLE=y
CONFIG_NET_HOSTNAME_DYNAMIC=y
CONFIG_NET_HOSTNAME="demo"
CONFIG_NET_DHCPV4=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV4_FRAGMENT=y
CONFIG_NET_IPV4_PMTU=y
CONFIG_NET_STATISTICS=y
CONFIG_NET_SHELL_SHOW_DISABLED_COMMANDS=n

CONFIG_HWINFO_SHELL=y

CONFIG_I2C=y
CONFIG_I2C_SHELL=y

CONFIG_INPUT=y
CONFIG_INPUT_SHELL=y
CONFIG_INPUT_EVENT_DUMP=y

CONFIG_LED=y
CONFIG_LED_SHELL=y

CONFIG_SENSOR=y
CONFIG_SENSOR_SHELL=y
CONFIG_SENSOR_INFO=y
